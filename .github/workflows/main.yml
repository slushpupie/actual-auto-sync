name: Main Branch Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.11.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:coverage

      - name: Run e2e tests
        run: pnpm test:e2e:docker

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          fail_ci_if_error: false

      - name: Generate commit hash
        id: commit_hash
        run: echo "hash=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Generate Actual Budget version tag
        id: actual_budget_version
        shell: bash
        run: |
          ACTUAL_BUDGET_VERSION=$(node -p "const v = require('./package.json').dependencies?.['@actual-app/api']; v ? v.replace(/^[~^]/, '') : ''")

          if [ -z "$ACTUAL_BUDGET_VERSION" ]; then
            echo "Error: Failed to extract @actual-app/api version"
            exit 1
          fi

          echo "version=$ACTUAL_BUDGET_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using Actual Budget version tag: $ACTUAL_BUDGET_VERSION"

      - name: Generate internal release number
        id: internal_release
        shell: bash
        env:
          BASE_VERSION: ${{ steps.actual_budget_version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INTERNAL_RELEASE_NUMBER=$(node <<'NODE'
          const baseVersion = process.env.BASE_VERSION;

          if (!baseVersion) {
            console.error("Missing BASE_VERSION");
            process.exit(1);
          }

          const versionPattern = new RegExp(`^${baseVersion.replace(/\./g, "\\.")}\\.(\\d+)$`);
          let maxInternalRelease = 0;

          (async () => {
            const githubToken = process.env.GITHUB_TOKEN;
            if (!githubToken) {
               console.error("Missing GITHUB_TOKEN");
               process.exit(1);
            }

            // 1. Get anonymous token for ghcr.io
            const authStr = Buffer.from(`${process.env.GITHUB_ACTOR}:${githubToken}`).toString('base64');
            const tokenRes = await fetch("https://ghcr.io/token?scope=repository:slushpupie/actual-auto-sync:pull", {
               headers: { Authorization: `Basic ${authStr}` }
            });

            if (!tokenRes.ok) {
               console.error(`Failed to get ghcr token: ${tokenRes.status} ${await tokenRes.text()}`);
               process.exit(1);
            }
            const { token } = await tokenRes.json();

            // 2. Fetch tags
            let nextUrl = "https://ghcr.io/v2/slushpupie/actual-auto-sync/tags/list";
            
            while (nextUrl) {
              const response = await fetch(nextUrl, {
                headers: { Authorization: `Bearer ${token}` }
              });
              
              if (response.status === 404) {
                 // Repository doesn't exist yet, start at 1
                 break;
              }
              
              if (!response.ok) {
                 const errBody = await response.text();
                 
                 // Handle specific NAME_UNKNOWN error from GHCR when repo is fully empty/new
                 if (errBody.includes('NAME_UNKNOWN')) {
                    break;
                 }
                throw new Error(`GHCR API request failed with status ${response.status}: ${errBody}`);
              }

              const payload = await response.json();

              for (const tag of payload.tags ?? []) {
                const match = versionPattern.exec(tag);
                if (!match) {
                  continue;
                }

                const releaseNumber = Number.parseInt(match[1], 10);
                if (Number.isInteger(releaseNumber) && releaseNumber > maxInternalRelease) {
                  maxInternalRelease = releaseNumber;
                }
              }

              // GHCR pagination usually relies on Link headers, but for simple use cases
              // or initial setups, tags list is small. 
              // We will just process the first page (up to 10k tags typically for registry v2)
              // https://docs.docker.com/registry/spec/api/#listing-image-tags
              nextUrl = null; 
            }

            process.stdout.write(String(maxInternalRelease + 1));
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE
          )

          if [ -z "$INTERNAL_RELEASE_NUMBER" ]; then
            echo "Error: Failed to calculate internal release number"
            exit 1
          fi

          VERSION_WITH_INTERNAL_RELEASE="${BASE_VERSION}.${INTERNAL_RELEASE_NUMBER}"
          echo "number=$INTERNAL_RELEASE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_WITH_INTERNAL_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Using internal release number: $INTERNAL_RELEASE_NUMBER"
          echo "Generated release version: $VERSION_WITH_INTERNAL_RELEASE"

      - name: Generate Docker tags
        id: docker_tags
        shell: bash
        run: |
          TAGS="ghcr.io/slushpupie/actual-auto-sync:latest
          ghcr.io/slushpupie/actual-auto-sync:${{ steps.commit_hash.outputs.hash }}
          ghcr.io/slushpupie/actual-auto-sync:${{ steps.internal_release.outputs.version }}
          ghcr.io/slushpupie/actual-auto-sync:v${{ steps.internal_release.outputs.version }}"

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
